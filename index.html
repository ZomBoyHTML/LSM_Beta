<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Desafío Maldito Subercaseaux</title>

    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background:
                radial-gradient(circle at center, #1a0000 0%, #050505 70%);
            font-family: 'Cinzel', serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: background 1s ease;
        }

        .noise {
            position: fixed;
            inset: 0;
            opacity: 0.08;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 6px;
            color: #d4b08a;
            margin-bottom: 10px;
            text-align: center;
        }

        .sub {
            color: #8f8f8f;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-align: center;
        }

        .board {

            width: 900px;
            max-width: 95vw;
            height: 520px;

            position: relative;
            overflow: visible;

            border-radius: 42px;

            background:
                linear-gradient(rgba(0, 0, 0, .35), rgba(0, 0, 0, .45)),
                url('board.avif');

            background-size: cover;
            background-position: center;

            border: 8px solid #140909;

            box-shadow:
                0 0 80px rgba(255, 0, 0, .15),
                0 25px 60px rgba(0, 0, 0, .8),
                inset 0 0 120px rgba(0, 0, 0, .75);
        }

        .board::after {

            content: '';

            position: absolute;

            inset: 0;

            border-radius: 42px;

            pointer-events: none;

            opacity: 0;

            transition:
                opacity 1s ease,
                filter 1s ease;

            background:

                radial-gradient(circle at center,
                    rgba(255, 40, 0, .18) 0%,
                    rgba(120, 0, 0, .12) 35%,
                    rgba(0, 0, 0, 0) 70%);

            mix-blend-mode: screen;
        }

        .board.awakened {

            box-shadow:
                0 0 40px rgba(255, 0, 0, .18),
                0 0 80px rgba(255, 0, 0, .12),
                0 25px 60px rgba(0, 0, 0, .8),
                inset 0 0 140px rgba(255, 0, 0, .18),
                inset 0 0 60px rgba(255, 120, 0, .08);
        }

        .board.awakened::after {

            opacity: 1;

            filter: blur(20px);
        }

        .board.awakened {

            animation: cursedGlow 2.5s ease-in-out infinite;
        }

        @keyframes cursedGlow {

            0% {

                filter: brightness(1);
            }

            50% {

                filter: brightness(1.08);
            }

            100% {

                filter: brightness(1);
            }
        }

        /* LETRAS */

        .letter {

            position: absolute;

            transform: translate(-50%, -50%);

            font-family: 'Cinzel', serif;

            font-size: 5rem;

            font-weight: 600;

            color: #120a07;

            letter-spacing: .04em;

            cursor: pointer;

            user-select: none;

            transition:
                color .25s ease,
                text-shadow .25s ease,
                filter .25s ease;

            /* EFECTO GRABADO */

            text-shadow:
                0 1px 0 rgba(255, 255, 255, .05),
                0 -1px 0 rgba(0, 0, 0, .8),
                0 0 3px rgba(0, 0, 0, .5);

            /* SUAVIZADO */

            -webkit-font-smoothing: antialiased;
        }

        .active {

            background:
                linear-gradient(to bottom,
                    #ff3d2f90 0%,
                    #7a0000 45%,
                    #120000 100%);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            text-shadow:
                0 0 10px rgba(255, 0, 0, .7),
                0 0 25px rgba(120, 0, 0, .45);

            filter:
                drop-shadow(0 0 8px rgba(255, 0, 0, .4));
        }

        /* FILA SUPERIOR */

        #a {
            top: 27.5%;
            left: 14.0%;
        }

        #b {
            top: 25.0%;
            left: 22.0%;
        }

        #c {
            top: 23.2%;
            left: 30.0%;
        }

        #d {
            top: 22.0%;
            left: 38.0%;
        }

        #e {
            top: 21.3%;
            left: 46.0%;
        }

        #f {
            top: 21.3%;
            left: 54.0%;
        }

        #g {
            top: 22.0%;
            left: 62.0%;
        }

        #h {
            top: 23.2%;
            left: 70.0%;
        }

        #i {
            top: 25.0%;
            left: 78.0%;
        }

        #j {
            top: 27.5%;
            left: 86.0%;
        }

        /* FILA MEDIO */

        #k {
            top: 43.5%;
            left: 18.0%;
        }

        #l {
            top: 40.8%;
            left: 26.0%;
        }

        #m {
            top: 38.5%;
            left: 34.0%;
        }

        #n {
            top: 36.8%;
            left: 42.0%;
        }

        #ñ {
            top: 36.0%;
            left: 50.0%;
        }

        #o {
            top: 36.8%;
            left: 58.0%;
        }

        #p {
            top: 38.5%;
            left: 66.0%;
        }

        #q {
            top: 40.8%;
            left: 74.0%;
        }

        #r {
            top: 43.5%;
            left: 82.0%;
        }

        /* FILA ABAJO */

        #s {
            top: 61.5%;
            left: 22.0%;
        }

        #t {
            top: 58.5%;
            left: 30.0%;
        }

        #u {
            top: 56.0%;
            left: 38.0%;
        }

        #v {
            top: 54.0%;
            left: 46.0%;
        }

        #w {
            top: 54.0%;
            left: 54.0%;
        }

        #x {
            top: 56.0%;
            left: 62.0%;
        }

        #y {
            top: 58.5%;
            left: 70.0%;
        }

        #z {
            top: 61.5%;
            left: 78.0%;
        }

        /* SI NO */

        .yes,
        .no {

            position: absolute;

            bottom: 72px;

            font-size: 3rem;

            font-family: 'Cinzel', serif;

            letter-spacing: .18em;

            color: rgba(214, 193, 160, .55);

            text-shadow:
                0 1px 0 rgba(255, 255, 255, .04),
                0 -1px 2px rgba(0, 0, 0, .75),
                0 0 2px rgba(0, 0, 0, .4);

            opacity: .9;

            filter:
                blur(.15px);

            user-select: none;
        }

        .yes::before,
        .no::before {

            content: '';

            position: absolute;

            inset: 0;

            background:
                repeating-linear-gradient(90deg,
                    transparent 0px,
                    rgba(0, 0, 0, .08) 2px,
                    transparent 4px);

            opacity: .35;

            pointer-events: none;
        }

        .yes {
            top: 72%;
            left: 20%;
        }

        .no {
            top: 72%;
            right: 20%;
        }


        /* OJO */

        .eye {

            position: absolute;

            bottom: 30px;

            left: 50%;

            transform: translateX(-50%) scale(.6);

            font-size: 5rem;

            color: rgba(255, 60, 30, 0);

            opacity: 0;

            pointer-events: none;

            transition:
                opacity 1.2s ease,
                transform 1.2s ease,
                color 1.2s ease,
                text-shadow 1.2s ease,
                filter 1.2s ease;

            z-index: 4;
        }

        .eye::before {

            content: '';

            position: absolute;

            inset: 0;

            background:
                repeating-linear-gradient(90deg,
                    transparent 0px,
                    rgba(0, 0, 0, .08) 2px,
                    transparent 4px);

            opacity: .3;

            pointer-events: none;
        }

        body.shake .eye {

            opacity: 1;

            transform:
                translateX(-50%) scale(1);

            color: rgba(255, 70, 40, .95);

            text-shadow:
                0 0 12px rgba(255, 0, 0, .9),
                0 0 25px rgba(255, 30, 0, .7),
                0 0 50px rgba(255, 0, 0, .35);

            filter:
                drop-shadow(0 0 12px rgba(255, 0, 0, .55));

            animation:
                eyePulse 1.4s ease-in-out infinite;
        }

        @keyframes eyePulse {

            0% {

                transform:
                    translateX(-50%) scale(1);

                filter:
                    drop-shadow(0 0 10px rgba(255, 0, 0, .4));
            }

            50% {

                transform:
                    translateX(-50%) scale(1.08);

                filter:
                    drop-shadow(0 0 18px rgba(255, 0, 0, .7));
            }

            100% {

                transform:
                    translateX(-50%) scale(1);

                filter:
                    drop-shadow(0 0 10px rgba(255, 0, 0, .4));
            }
        }

        /* MENSAJES */

        .message {
            margin-top: 20px;
            height: 30px;
            color: #ff3434;
            letter-spacing: 4px;
        }

        /* VIDEO */

        .video-container {

            position: fixed;

            inset: 0;

            background:
                linear-gradient(to bottom,
                    #000 0%,
                    #0a0000 45%,
                    #3b0000 100%);

            display: flex;

            justify-content: center;

            align-items: center;

            flex-direction: column;

            gap: 10px;

            padding-top: 0;

            opacity: 0;

            visibility: hidden;

            pointer-events: none;

            transition:
                opacity .7s ease,
                visibility .7s ease,
                transform .7s ease;

            transform: translateY(20px);

            z-index: 100;
        }

        .video-container.visible {

            opacity: 1;

            visibility: visible;

            pointer-events: auto;

            transform: translateY(0);
        }

        iframe {
            width: 90vw;
            max-width: 1000px;
            height: 56vw;
            max-height: 560px;

            border: 2px solid red;

            box-shadow: 0 0 40px rgba(255, 0, 0, .5);
            opacity: 0;
            transform: translateY(20px) scale(.97);
            transition: opacity .7s ease, transform .7s ease;
        }

        .video-container.visible iframe {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .complete {
            color: red;
            font-size: 2rem;
            width: 100%;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 8px;
        }

        .social-links {
            margin-top: 0px;
            display: flex;
            gap: 22px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-links a {

            width: 58px;
            height: 58px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;

            color: #f5e6d0;

            background: rgba(0, 0, 0, 0.25);

            border: 1px solid rgba(255, 255, 255, 0.08);

            text-decoration: none;

            transition:
                transform .25s ease,
                border-color .25s ease,
                background .25s ease;
        }

        .social-links a:hover {

            transform: translateY(-4px) scale(1.05);

            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .social-links i {
            font-size: 1.5rem;
            color: #f5e6d0;
            text-shadow: 0 0 8px rgba(255, 214, 157, 0.45);
            transition: color .25s ease, text-shadow .25s ease, filter .25s ease;
        }

        .social-links a:hover i {
            color: #ffdc92;
            text-shadow: 0 0 16px rgba(255, 214, 157, 0.8);
            filter: drop-shadow(0 0 10px rgba(255, 214, 157, 0.45));
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
            white-space: nowrap;
        }

        /* TEMBLOR */

        .shake {
            animation: shake .15s infinite;
        }

        @keyframes shake {

            0% {
                transform: translate(0);
            }

            25% {
                transform: translate(4px, -4px);
            }

            50% {
                transform: translate(-4px, 4px);
            }

            75% {
                transform: translate(4px, 4px);
            }

            100% {
                transform: translate(0);
            }
        }

        .candle {
            position: absolute;
            z-index: 5;
            overflow: visible;

            width: 22px;
            height: 95px;

            border-radius: 10px;

            background:

                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, .08), transparent 35%),
                radial-gradient(circle at 70% 60%, rgba(0, 0, 0, .25), transparent 40%),

                repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, .02) 0px,
                    rgba(0, 0, 0, .02) 2px,
                    rgba(255, 255, 255, .01) 4px),

                linear-gradient(to right,
                    #2a0000 0%,
                    #6b0000 18%,
                    #9a1414 45%,
                    #6b0000 72%,
                    #1a0000 100%);

            border: 1px solid rgba(255, 255, 255, .06);

            box-shadow:
                inset -5px 0 10px rgba(0, 0, 0, .55),
                inset 4px 0 6px rgba(255, 255, 255, .05),
                inset 0 -12px 14px rgba(0, 0, 0, .4),

                /* 🔥 sombra exterior más realista */
                0 6px 10px rgba(0, 0, 0, .35);
        }

        .candle::after {
            content: '';

            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);

            width: 120%;
            height: 26px;

            border-radius: 50% 50% 45% 45% / 70% 70% 30% 30%;

            background:
                radial-gradient(circle at 30% 40%,
                    rgba(255, 255, 255, .18),
                    rgba(160, 0, 0, .9) 45%,
                    rgba(60, 0, 0, 1) 100%);

            box-shadow:
                inset 0 -6px 8px rgba(0, 0, 0, .5),
                0 2px 6px rgba(0, 0, 0, .3);
        }

        /* LLAMA */

        .candle .flame {
            position: absolute;
            z-index: 20;
            top: -15px;
            left: 50%;

            width: 14px;
            height: 26px;

            transform: translateX(-50%) rotate(-6deg) scale(0);
            opacity: 0;
            transform-origin: bottom center;

            background: radial-gradient(circle at 35% 65%,
                    #93c9ff7f 0%,
                    #e0ebff7d 18%,
                    #ffd05a8f 45%,
                    #ff7818a7 70%,
                    #b30000 100%);

            border-radius: 55% 45% 60% 40% / 70% 70% 30% 30%;

            filter: blur(0.7px);
            opacity: 0;

            animation: flicker 3.5s infinite ease-in-out;

            box-shadow:
                -2px 0px 10px rgba(51, 91, 164, 0.283),
                2px 0px 14px rgba(255, 80, 30, 0.35);
        }

        /* PRENDIDA */

        .lit {

            box-shadow:
                0 0 20px rgba(255, 0, 0, 0.308),
                0 0 40px rgba(255, 80, 0, .3),
                inset 0 -10px 15px rgba(0, 0, 0, 0.555),
                inset 0 10px 10px rgba(255, 255, 255, .05);
        }

        .lit .flame {
            animation: ignite 0.6s ease-out forwards, flicker 3.5s infinite ease-in-out 0.6s;
        }

        /* PARPADEO */

        @keyframes flicker {
            0% {
                transform: translateX(-50%) rotate(-6deg) scale(1);
            }

            25% {
                transform: translateX(-52%) rotate(-3deg) scale(1.05);
            }

            50% {
                transform: translateX(-48%) rotate(-7deg) scale(0.98);
            }

            75% {
                transform: translateX(-51%) rotate(-2deg) scale(1.03);
            }

            100% {
                transform: translateX(-50%) rotate(-6deg) scale(1);
            }
        }

        @keyframes ignite {
            0% {
                transform: translateX(-50%) scale(0) rotate(-10deg);
                opacity: 0;
                filter: blur(3px);
            }

            40% {
                transform: translateX(-50%) scale(1.4) rotate(8deg);
                opacity: 1;
                filter: blur(1px);
            }

            70% {
                transform: translateX(-50%) scale(0.9) rotate(-4deg);
                opacity: 1;
                filter: blur(0.8px);
            }

            100% {
                transform: translateX(-50%) scale(1) rotate(-6deg);
                opacity: 1;
                filter: blur(0.7px);
            }
        }

        /* POSICIONES */

        .c1 {
            top: -32px;
            left: 80px;
        }

        .c2 {
            top: -32px;
            right: 80px;
        }

        .c3 {
            top: 128px;
            left: 4px;
        }

        .c4 {
            top: 128px;
            right: 4px;
        }

        .c5 {
            bottom: 20px;
            left: 32px;
        }

        .c6 {
            bottom: 20px;
            right: 32px;
        }


        @media (max-width: 900px) {
            body {
                padding: 0;
            }

            h1 {
                font-size: 2.4rem;
            }

            .sub {
                margin-bottom: 18px;
                font-size: 0.95rem;
            }

            .board {
                width: 96vw;
                max-width: 96vw;
                height: 420px;
            }

            .letter {
                font-size: 3rem;
            }

            .yes,
            .no {
                font-size: 2.4rem;
            }

            .yes {
                left: 18%;
            }

            .no {
                right: 18%;
            }
        }

        @media (max-width: 600px) {
            .board {
                width: 96vw;
                height: 360px;
                margin-top: 24px;
            }

            .letter {
                font-size: 2.7rem;
            }

            .candle {
                width: 20px;
                height: 68px;
            }

            .c1,
            .c2 {
                top: -25px;
            }

            .c3 {
                top: 30px;
                left: 8px;
            }

            .c4 {
                top: 30px;
                right: 8px;
            }

            .c5 {
                bottom: 18px;
                left: 8px;
            }

            .c6 {
                bottom: 18px;
                right: 8px;
            }


            h1 {
                font-size: 2rem;
            }

            .sub {
                font-size: 0.9rem;
            }

            .yes,
            .no {
                font-size: 2rem;
            }

            .yes {
                left: 14%;
            }

            .no {
                right: 14%;
            }
        }

        .copyright {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            z-index: 1;
            transition: opacity .2s ease;
        }

        body.shake .copyright,
        body.video-active .copyright {
            opacity: 0;
        }

        .available {

            color: rgba(255, 255, 255, .72);

            font-size: 1.1rem;

            letter-spacing: .25em;

            text-transform: uppercase;

            margin-top: 15px;

            margin-bottom: 10px;

            text-align: center;

            text-shadow:
                0 0 8px rgba(255, 255, 255, .08),
                0 0 20px rgba(255, 0, 0, .12);
        }
    </style>
</head>

        const candles = document.querySelectorAll('.candle');

        let candleIndex = 0;

        function lightCandle() {

            if (candleIndex < candles.length) {

                candles[candleIndex].classList.add('lit');

                candleIndex++;
            }
        }


        document.querySelectorAll('.letter').forEach(letter => {

            letter.addEventListener('click', () => {

                const value = letter.innerText;

                current.push(value);

                /* EFECTO TEMPORAL */

                letter.classList.add('active');

                setTimeout(() => {
                    letter.classList.remove('active');
                }, 350);

                lightCandle();

                verify();
            });

        });

        function verify() {

            for (let i = 0; i < current.length; i++) {

                if (current[i] != correctWord[i]) {

                    message.innerHTML =
                        'EL RITUAL FALLÓ';

                    setTimeout(reset, 1000);

                    return;
                }
            }

            if (current.length == correctWord.length) {

                message.innerHTML =
                    'LA SEÑAL DESPERTÓ';

                document.querySelector('.board')
                    .classList.add('awakened');

                document.body.classList.add('shake');

                setTimeout(() => {

                    document.body.classList.remove('shake');
                    document.body.classList.add('video-active');

                    video.src =
                        'https://www.youtube.com/embed/ntsHOYSJbw4?autoplay=1';

                    videoContainer.classList.add('visible');

                }, 2500);
            }
        }

        function reset() {

            current = [];

            document.querySelectorAll('.letter')
                .forEach(l => l.classList.remove('active'));

            message.innerHTML = '';

            candleIndex = 0;

            candles.forEach(c => {
                c.classList.remove('lit');
            });
        }

        // Evitar inspección básica y copiado desde teclado / click derecho
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', event => {
            if (
                event.key === 'F12' ||
                (event.ctrlKey && event.shiftKey && ['I', 'J', 'C', 'K'].includes(event.key.toUpperCase())) ||
                (event.ctrlKey && event.key.toUpperCase() === 'U') ||
                (event.ctrlKey && event.key.toUpperCase() === 'S') ||
                (event.ctrlKey && event.key === 'F')
            ) {
                event.preventDefault();
                event.stopPropagation();
            }
        });

        document.addEventListener('copy', event => {
            event.preventDefault();
        });
    </script>

</body>

</html>
